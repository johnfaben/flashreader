<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pictogram Curation Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #FFF8F0; padding: 20px; }
    h1 { text-align: center; color: #FF6B6B; margin-bottom: 8px; }
    .stats { text-align: center; color: #B8B0A8; margin-bottom: 20px; font-weight: 600; }
    .controls { text-align: center; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .controls button {
      padding: 8px 16px; border: none; border-radius: 10px; font-family: inherit;
      font-weight: 700; font-size: 0.9rem; cursor: pointer;
    }
    .btn-export { background: #4ECDC4; color: white; }
    .btn-import { background: #FF6B6B; color: white; }
    .btn-filter { background: #E8E0D8; color: #2D3436; }
    .btn-filter.active { background: #4ECDC4; color: white; }
    .word-section {
      max-width: 800px; margin: 0 auto 24px; background: white;
      border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .word-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .word-header h2 { font-size: 1.3rem; color: #2D3436; }
    .word-header .status {
      font-size: 0.8rem; padding: 3px 10px; border-radius: 8px; font-weight: 700;
    }
    .status-picked { background: #E8FFF8; color: #4ECDC4; }
    .status-pending { background: #FFF0E0; color: #FF9F43; }
    .status-none { background: #FFE8E8; color: #FF6B6B; }
    .status-removed { background: #F0F0F0; color: #999; }
    .word-section.removed { opacity: 0.5; }
    .btn-remove {
      margin-left: auto; padding: 4px 12px; border: 2px solid #E8E0D8; border-radius: 8px;
      background: white; font-family: inherit; font-weight: 700; font-size: 0.8rem;
      cursor: pointer; color: #B8B0A8; transition: all 0.15s;
    }
    .btn-remove:hover { border-color: #FF6B6B; color: #FF6B6B; }
    .btn-remove.is-removed { border-color: #FF6B6B; background: #FFE8E8; color: #FF6B6B; }
    .btn-search {
      padding: 4px 12px; border: 2px solid #E8E0D8; border-radius: 8px;
      background: white; font-family: inherit; font-weight: 700; font-size: 0.8rem;
      cursor: pointer; color: #B8B0A8; transition: all 0.15s;
    }
    .btn-search:hover { border-color: #4ECDC4; color: #4ECDC4; }
    .extra-results { margin-top: 12px; padding-top: 12px; border-top: 2px dashed #E8E0D8; }
    .extra-results .options { margin-top: 8px; }
    .extra-label { font-size: 0.8rem; color: #B8B0A8; font-weight: 600; }
    .options {
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .option {
      width: 120px; text-align: center; cursor: pointer;
      border: 3px solid #E8E0D8; border-radius: 12px; padding: 8px;
      transition: all 0.15s ease; background: white;
    }
    .option:hover { border-color: #4ECDC4; transform: scale(1.03); }
    .option.selected { border-color: #4ECDC4; background: #E8FFF8; }
    .option.rejected { opacity: 0.3; border-color: #FF6B6B; }
    .option img {
      width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px;
    }
    .option .id { font-size: 0.7rem; color: #B8B0A8; margin-top: 4px; }
    .no-images { color: #B8B0A8; font-style: italic; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Pictogram Curation</h1>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <button class="btn-filter active" onclick="setFilter('all')">All</button>
    <button class="btn-filter" onclick="setFilter('pending')">Pending</button>
    <button class="btn-filter" onclick="setFilter('picked')">Picked</button>
    <button class="btn-filter" onclick="setFilter('none')">No images</button>
    <button class="btn-filter" onclick="setFilter('removed')">Removed</button>
    <button class="btn-export" onclick="exportSelections()">Export JSON</button>
    <button class="btn-import" onclick="importSelections()">Import JSON</button>
  </div>
  <div id="words"></div>

  <script>
    // Word list extracted from wordData.js
    const ALL_WORDS = [
      "sat","tap","pan","pin","tin","nap","mat","man","map","dig","dog","god","got","cat","cap","cop","kid","kit","kick","duck","sock","pack","neck",
      "net","pet","pen","red","run","rug","cup","cut","sun","mug","bug","bus","bat","bed","bin","big","hug","hat","hen","hit","hot","hop","fun","fan","fig","fog","leg","lid","log","lip",
      "ship","shop","shed","shut","shell","fish","dish","rush","chin","chop","chat","rich","much","thin","thick","moth",
      "king","ring","sing","song","rain","tail","mail","nail","snail",
      "bee","tree","seed","feet","moon","boot","food","cool","pool","boat","coat","goat","road",
      "car","star","park","dark","fork","corn","horn","curl","burn","hurt","fur","cow","owl","town",
      "coin","oil","soil","her","fern",
      "flag","flat","frog","drum","drop","crab","clip","clap","plug","plum","grip","grin","brim","brick","black","blob",
      "skip","skin","slim","slug","slip","snip","spot","spin","stem","stop","step","swim","swan","trim","trip","trap","tram","truck","pram","press","glad","glass","smell","scan",
      "cake","lake","gate","name","game","bike","kite","lime","nine","bone","home","nose","rope","cube","tube",
      "leaf","meat","bean","seal","peach","pie","tie","loud","cloud","mouse","house","phone","whale","wheel","white","key","monkey","honey"
    ];

    // Selections stored in localStorage
    let selections = JSON.parse(localStorage.getItem('pictogramSelections') || '{}');
    // selections[word] can be: a pictogram ID string (picked), or "__removed__" (removed)
    let wordImages = {}; // word -> [id, id, ...]
    let currentFilter = 'all';

    async function init() {
      // Discover available images by fetching directory listings
      // Since we can't list dirs from a static page, we'll scan known IDs
      // Instead, let's load a manifest
      await loadManifest();
      render();
    }

    async function loadManifest() {
      // Try loading manifest file, fall back to probing
      try {
        const resp = await fetch('pictograms/manifest.json');
        if (resp.ok) {
          wordImages = await resp.json();
          return;
        }
      } catch(e) {}

      // No manifest — show a message
      document.getElementById('words').innerHTML = `
        <div class="word-section">
          <p>No manifest.json found. Please run this command to generate it:</p>
          <pre style="background:#f0f0f0; padding:12px; border-radius:8px; margin-top:8px; overflow-x:auto; font-size:0.85rem">node generate_manifest.js</pre>
        </div>`;
    }

    function render() {
      const container = document.getElementById('words');
      container.innerHTML = '';

      let picked = 0, pending = 0, noImg = 0, removed = 0;

      for (const word of ALL_WORDS) {
        const images = wordImages[word] || [];
        const sel = selections[word];
        const isRemoved = sel === '__removed__';
        let status, statusClass;

        if (isRemoved) {
          status = 'removed';
          statusClass = 'status-removed';
          removed++;
        } else if (images.length === 0) {
          status = 'no images';
          statusClass = 'status-none';
          noImg++;
        } else if (sel) {
          status = 'picked';
          statusClass = 'status-picked';
          picked++;
        } else {
          status = 'pending';
          statusClass = 'status-pending';
          pending++;
        }

        // Filter
        if (currentFilter === 'pending' && status !== 'pending') continue;
        if (currentFilter === 'picked' && status !== 'picked') continue;
        if (currentFilter === 'none' && status !== 'no images') continue;
        if (currentFilter === 'removed' && status !== 'removed') continue;

        const section = document.createElement('div');
        section.className = 'word-section' + (isRemoved ? ' removed' : '');

        const removeLabel = isRemoved ? 'Restore' : 'Remove word';
        const removeCls = isRemoved ? 'btn-remove is-removed' : 'btn-remove';
        section.innerHTML = `
          <div class="word-header">
            <h2>${word}</h2>
            <span class="status ${statusClass}">${status}</span>
            <button class="btn-search" data-word="${word}">Search more</button>
            <button class="${removeCls}" data-word="${word}">${removeLabel}</button>
          </div>`;

        section.querySelector('.btn-search').addEventListener('click', () => searchMore(word, section));
        section.querySelector('.btn-remove').addEventListener('click', () => toggleRemove(word));

        if (!isRemoved) {
          if (images.length === 0) {
            section.innerHTML += `<div class="no-images">No pictograms available</div>`;
          } else {
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            for (const id of images) {
              const opt = document.createElement('div');
              opt.className = 'option';
              if (sel === String(id)) opt.classList.add('selected');
              opt.innerHTML = `
                <img src="pictograms/${word}/${id}.png" alt="${word} - ${id}" loading="lazy">
                <div class="id">#${id}</div>`;
              opt.addEventListener('click', () => toggleSelection(word, String(id)));
              optionsDiv.appendChild(opt);
            }
            section.appendChild(optionsDiv);
          }
        }

        container.appendChild(section);
      }

      document.getElementById('stats').textContent =
        `${picked} picked / ${pending} pending / ${noImg} no images / ${removed} removed — ${ALL_WORDS.length} total words`;
    }

    async function searchMore(word, section) {
      const btn = section.querySelector('.btn-search');
      btn.textContent = 'Searching...';
      btn.disabled = true;

      try {
        const resp = await fetch(`https://api.arasaac.org/v1/pictograms/en/search/${word}`);
        if (!resp.ok) { btn.textContent = 'No results'; return; }
        const data = await resp.json();
        if (!Array.isArray(data) || data.length === 0) { btn.textContent = 'No results'; return; }

        // Get IDs we already have
        const existing = new Set((wordImages[word] || []).map(String));
        const newIds = data
          .map(item => String(item._id))
          .filter(id => !existing.has(id))
          .slice(0, 15);

        if (newIds.length === 0) { btn.textContent = 'No more found'; return; }

        // Remove any previous extra-results section
        const oldExtra = section.querySelector('.extra-results');
        if (oldExtra) oldExtra.remove();

        const extraDiv = document.createElement('div');
        extraDiv.className = 'extra-results';
        extraDiv.innerHTML = `<div class="extra-label">More results for "${word}":</div>`;
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        for (const id of newIds) {
          const opt = document.createElement('div');
          opt.className = 'option';
          opt.innerHTML = `
            <img src="https://static.arasaac.org/pictograms/${id}/${id}_500.png" alt="${word} - ${id}" loading="lazy">
            <div class="id">#${id}</div>`;
          opt.addEventListener('click', () => {
            selections[word] = id;
            // Add to wordImages so it persists in view
            if (!wordImages[word]) wordImages[word] = [];
            if (!wordImages[word].includes(id)) wordImages[word].push(id);
            localStorage.setItem('pictogramSelections', JSON.stringify(selections));
            render();
          });
          optionsDiv.appendChild(opt);
        }

        extraDiv.appendChild(optionsDiv);
        section.appendChild(extraDiv);
        btn.textContent = `+${newIds.length} more`;
      } catch(e) {
        btn.textContent = 'Error';
        console.error(e);
      }
    }

    function toggleRemove(word) {
      if (selections[word] === '__removed__') {
        delete selections[word];
      } else {
        selections[word] = '__removed__';
      }
      localStorage.setItem('pictogramSelections', JSON.stringify(selections));
      render();
    }

    function toggleSelection(word, id) {
      if (selections[word] === id) {
        delete selections[word];
      } else {
        selections[word] = id;
      }
      localStorage.setItem('pictogramSelections', JSON.stringify(selections));
      render();
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }

    function exportSelections() {
      const data = JSON.stringify(selections, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pictogram_selections.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importSelections() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        selections = JSON.parse(text);
        localStorage.setItem('pictogramSelections', JSON.stringify(selections));
        render();
      };
      input.click();
    }

    init();
  </script>
</body>
</html>
