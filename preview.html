<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Picture Preview</title>
  <style>
    body { font-family: sans-serif; background: #FFF8F0; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
    .card { text-align: center; }
    .card h3 { margin: 0 0 8px; }
    canvas { border: 2px solid #ccc; border-radius: 12px; background: #fff; }
  </style>
</head>
<body>
  <script src="cardPictures.js"></script>
  <script>
    const words = Object.keys(cardPictures);
    const SIZE = 250;
    const dpr = window.devicePixelRatio || 1;
    for (const word of words) {
      const div = document.createElement('div');
      div.className = 'card';
      const h3 = document.createElement('h3');
      h3.textContent = word;
      div.appendChild(h3);
      const canvas = document.createElement('canvas');
      canvas.width = SIZE * dpr;
      canvas.height = SIZE * dpr;
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      cardPictures[word](ctx, SIZE, SIZE);
      div.appendChild(canvas);
      document.body.appendChild(div);
    }
  </script>
</body>
</html>
